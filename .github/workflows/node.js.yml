# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test
    - name: Setup React
      # You may pin to the exact commit or the version.
      # uses: kirkeaton/setup-react@f44b147594605c7d3651a757a6292136c010647e
      uses: kirkeaton/setup-react@v1.0.5
      with:
        # The React version to install.
        react-version: 
        # The React DOM version to install.
        react-dom-version: 
        # The React types version to install.
        react-types-version: # optional
        # The React DOM types version to install.
        react-dom-types-version: # optional
          
